<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nova</title>
</head>
<body>
  <!-- three.js renders into this canvas -->
  <canvas id="canvas"></canvas>

  <!-- Top-right controls -->
  <button id="transcript-btn" aria-label="Conversation" title="Conversation">📝</button>
  <button id="settings-gear" aria-label="Settings" title="Settings">⚙</button>

  <!-- Transcript panel (conversation review) -->
  <div id="transcript-panel" hidden role="dialog" aria-label="Conversation">
    <div class="settings-header">
      <span>Conversation</span>
      <button id="transcript-close" aria-label="Close conversation">✕</button>
    </div>
    <div id="transcript-list">
      <p class="transcript-empty">Your chat with Nova will appear here.</p>
    </div>
  </div>

  <!-- Settings panel (hidden until the gear is tapped) -->
  <div id="settings-panel" hidden role="dialog" aria-label="Settings">
    <div class="settings-header">
      <span>Settings</span>
      <button id="settings-close" aria-label="Close settings">✕</button>
    </div>

    <section class="settings-section">
      <h3>Kid</h3>
      <div id="profile-selector" role="group" aria-label="Child profile"></div>
    </section>

    <section class="settings-section">
      <h3>Language</h3>
      <div id="language-selector" role="group" aria-label="Language">
        <button class="chip" data-language="en">English</button>
        <button class="chip" data-language="ja" lang="ja">日本語</button>
      </div>
    </section>

    <section class="settings-section">
      <h3>Voice</h3>
      <div id="voice-selector" role="group" aria-label="Voice"></div>
    </section>

    <section class="settings-section">
      <!-- Heading + chips are filled in per the active profile's language
           (CEFR for English, JLPT for Japanese) from the server's settings. -->
      <h3 id="level-heading">Level</h3>
      <div id="level-selector" role="group" aria-label="Level"></div>
    </section>

    <!-- Credits — satisfies CC-BY attribution for the default avatar in the
         distributed app (the source README alone isn't enough; CC-BY 4.0 §3(a)
         requires the credit to travel with the redistributed work). Kept as
         the last section so it doesn't compete with the actionable controls. -->
    <section class="settings-section credits-section">
      <h3>Credits</h3>
      <p class="credits">
        Default avatar: <em>VIPE Hero #2707</em> from
        <a href="https://vipe.io" target="_blank" rel="noopener">VIPE Heroes Genesis</a>,
        via
        <a href="https://www.opensourceavatars.com/en/finder?avatar=vipe-hero-2707"
           target="_blank" rel="noopener">opensourceavatars.com</a>
        (ToxSam) — licensed
        <a href="https://creativecommons.org/licenses/by/4.0/"
           target="_blank" rel="noopener">CC BY 4.0</a>.
      </p>
      <p class="credits">
        Alternative avatar: <em>Olivia</em> (100 Avatars #056 by Polygonal Mind), CC0.
      </p>
    </section>
  </div>

  <!-- Text overlay: sentence bubble + state label -->
  <div id="overlay">
    <div id="sentence-bubble"></div>
    <div id="state-label">Connecting…</div>
    <button id="replay-last" hidden aria-label="Hear what Nova said again">🔊 Say it again</button>
  </div>

  <!-- Transcript flash (what the app heard) -->
  <div id="transcript"></div>

  <!-- Modal dialog (in-app prompt/confirm — window.prompt is a no-op in the
       Tauri webview, so we roll our own) -->
  <div id="modal-overlay" hidden>
    <div id="modal" role="dialog" aria-modal="true" aria-labelledby="modal-message">
      <p id="modal-message"></p>
      <input id="modal-input" type="text" autocomplete="off" hidden />
      <!-- Choice chips (e.g. pick a language when adding a child). Populated by
           openModal({choices:[…]}); hidden for plain prompt/confirm dialogs. -->
      <div id="modal-choices" role="group" hidden></div>
      <div id="modal-actions">
        <button id="modal-cancel" class="chip" type="button">Cancel</button>
        <button id="modal-confirm" class="chip active" type="button">OK</button>
      </div>
    </div>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
