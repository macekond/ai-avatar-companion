<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nova</title>
</head>
<body>
  <!-- three.js renders into this canvas -->
  <canvas id="canvas"></canvas>

  <!-- Profile selector — top-right corner -->
  <div id="profile-selector" role="group" aria-label="Child profile"></div>

  <!-- English level selector — top-left corner -->
  <div id="level-selector" role="group" aria-label="English level">
    <button class="level-btn" data-level="Pre A">Pre A</button>
    <button class="level-btn" data-level="A">A</button>
    <button class="level-btn" data-level="B">B</button>
    <button class="level-btn" data-level="C1">C1</button>
    <button class="level-btn" data-level="C2">C2</button>
  </div>

  <!-- Text overlay: sentence bubble + state label -->
  <div id="overlay">
    <div id="sentence-bubble"></div>
    <div id="state-label">Connecting…</div>
  </div>

  <!-- Transcript flash (what the app heard) -->
  <div id="transcript"></div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
