name: Tag & Release

# On every push to main:
#   1. Tag job (Linux): create v<version> from tauri.conf.json, or move it to
#      this commit — safety net so a version bump landing on main can never
#      ship untagged. The tag is provisional (movable) until a GitHub Release
#      actually exists under it; only then does it become immutable. Without
#      this, a CI-only fix commit (build script, workflow) landing on main
#      before the release job ever succeeds would leave v<version> pinned to
#      the earlier, broken-build commit forever.
#   2. Release job (macOS): if no GitHub Release exists for this tag yet, build
#      the DMG via packaging/build.sh and publish a Release with the merged
#      PR's body (the release-PR template) as the notes, DMG attached.
#
# Idempotent once released. A repeat push at the same version no-ops both jobs
# after the Release exists; before that, the tag job keeps re-pointing the tag
# and the release job keeps retrying the build.
#
# Public repo → macOS runner minutes are free.
on:
  push:
    branches: [main]

concurrency:
  # Serialise: prevents two rapid merges from racing over the release upload.
  group: tag-release
  cancel-in-progress: false

jobs:
  tag:
    name: tag v<version> if missing
    runs-on: ubuntu-latest
    permissions:
      contents: write   # required to push tags
    outputs:
      version: ${{ steps.v.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          # Full tag history so `git rev-parse` sees existing tags.
          fetch-depth: 0

      - name: Read version from tauri.conf.json
        id: v
        run: |
          VERSION=$(python3 -c "import json;print(json.load(open('src-tauri/tauri.conf.json'))['version'])")
          [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]] || { echo "::error::Bad version: $VERSION"; exit 1; }
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Create or move v<version> tag (immutable once released)
        env:
          VERSION: ${{ steps.v.outputs.version }}
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "v${VERSION}" -R "${{ github.repository }}" >/dev/null 2>&1; then
            echo "Release v${VERSION} already published — tag is immutable, nothing to do."
            exit 0
          fi
          # No Release exists under this tag yet, so it's still provisional —
          # (re)point it at this commit. Covers both "tag doesn't exist yet"
          # and "tag exists but points at an earlier, unreleased commit"
          # (e.g. a CI-fix commit landed after a failed release attempt).
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -f -a "v${VERSION}" -m "Nova v${VERSION}"
          git push origin "v${VERSION}" --force

  release:
    name: build DMG & publish release
    needs: tag
    # macos-14 = Apple Silicon runner (matches packaging/build.sh's arm64 target).
    runs-on: macos-14
    permissions:
      contents: write   # required to create the GitHub Release
    env:
      VERSION: ${{ needs.tag.outputs.version }}
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Skip if release for v<version> already exists
        id: check
        run: |
          if gh release view "v${VERSION}" -R "${{ github.repository }}" >/dev/null 2>&1; then
            echo "Release v${VERSION} already published — no-op."
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v4
        if: steps.check.outputs.exists == 'false'
        with:
          # Pin to the exact commit that triggered this run (the tag's target),
          # not `main` — someone could push again before this job starts.
          ref: ${{ github.sha }}
          fetch-depth: 0

      - name: Compose release notes from merged PR body
        if: steps.check.outputs.exists == 'false'
        run: |
          # Ask GitHub which PR (if any) contributed this commit — works for
          # merge commits and squash merges. Falls back to the tag message on
          # direct pushes to main (unusual but shouldn't break the release).
          BODY=$(gh api "repos/${{ github.repository }}/commits/${{ github.sha }}/pulls" \
                  --jq '.[0].body // empty' || true)
          if [[ -z "$BODY" ]]; then
            BODY=$(git tag -l --format='%(contents)' "v${VERSION}")
          fi
          # --notes-file handles multi-line bodies safely (env vars would need
          # extra quoting). Written to RUNNER_TEMP, not the repo root — every
          # single release attempt so far has been mislabelled a "dev build"
          # because build.sh's dirty-tree check sees this file as untracked.
          printf '%s\n' "$BODY" > "${RUNNER_TEMP}/release-notes.md"

      - name: Set up Python
        if: steps.check.outputs.exists == 'false'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Set up Node
        if: steps.check.outputs.exists == 'false'
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Install Python deps (venv the build script expects)
        if: steps.check.outputs.exists == 'false'
        run: |
          python -m venv .venv
          .venv/bin/pip install --upgrade pip
          .venv/bin/pip install -r requirements-dev.txt

      - name: Install UI deps
        if: steps.check.outputs.exists == 'false'
        # `ci`, not `install` — install silently rewrites package-lock.json on
        # any drift (e.g. a missed version bump), which git then reports as a
        # dirty tree and mislabels the release build as a dev build. `ci`
        # trusts the lockfile as-is and fails loudly instead if it's stale.
        run: npm --prefix ui ci

      - name: Free up disk space
        if: steps.check.outputs.exists == 'false'
        # macOS runners preinstall the Android SDK and several Xcode versions
        # that this build never touches but that eat into the ~14GB free
        # budget. The Japanese TTS chain (pyopenjtalk, Kokoro, onnxruntime,
        # unidic-lite — see requirements.txt) plus the Rust/Tauri release
        # build plus a second PyInstaller-frozen copy of the venv routinely
        # blew past that budget (hdiutil failing with "No space left on
        # device"). Only the ACTIVE Xcode is kept — Tauri's build links
        # against it (swift-rs) — everything else is safe to drop.
        run: |
          df -h /
          sudo rm -rf /Users/runner/Library/Android/sdk
          ACTIVE_XCODE=$(xcode-select -p | sed -E 's#(/Applications/Xcode[^/]*\.app)/.*#\1#')
          for x in /Applications/Xcode*.app; do
            [[ "$x" == "$ACTIVE_XCODE" ]] || sudo rm -rf "$x"
          done
          df -h /

      - name: Build DMG
        if: steps.check.outputs.exists == 'false'
        # build.sh detects the v<version> tag on HEAD + clean tree and emits
        # Nova_<version>_aarch64.dmg (release name, no timestamp).
        run: bash packaging/build.sh

      - name: Publish GitHub Release with DMG
        if: steps.check.outputs.exists == 'false'
        run: |
          DMG="src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/Nova_${VERSION}_aarch64.dmg"
          [[ -f "$DMG" ]] || { echo "::error::DMG not found at $DMG"; ls -R src-tauri/target/aarch64-apple-darwin/release/bundle || true; exit 1; }
          gh release create "v${VERSION}" \
            --title "Nova v${VERSION}" \
            --notes-file "${RUNNER_TEMP}/release-notes.md" \
            -R "${{ github.repository }}" \
            "$DMG"
