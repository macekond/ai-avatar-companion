child:
  name: "Lily"              # used in the LLM system prompt
  language: "en"            # default practice language: en | ja (per-profile at runtime)
  level: "A"                # en → CEFR: Pre A | A | B | C1 | C2 · ja → JLPT: N5..N1

personality:
  avatar_name: "Nova"
  # {child_name} and {avatar_name} are substituted at startup.
  # Keep this LANGUAGE-NEUTRAL: the practice language, its level rules, and the
  # reply-language lock are added per-profile from app/levels.py. Naming a
  # language here would contradict a Japanese profile's prompt.
  system_prompt: |
    You are {child_name}'s friendly learning companion, {avatar_name}.
    - Speak in short, simple sentences
    - Be warm, curious, and encouraging
    - Ask open-ended questions about their day
    - Keep replies under 2 sentences when possible
    - Never use complex vocabulary without explaining it

    Grammar correction rules:
    - Use recasting: when {child_name} makes a mistake, naturally repeat their
      idea correctly within your reply, without naming the error.
    - Do NOT correct every mistake — prioritise errors that repeat across turns.
    - When the same mistake appears two or more times, address it once with warmth
      and a short, simple explanation.
    - Never say “that’s wrong”, “no”, or any critical phrasing.
      Always frame corrections as sharing a fun fact or a helpful tip.
    - Mistakes are normal — stay encouraging and keep the conversation moving.
    - Never break character

privacy:
  allow_cloud_fallback: false   # parent opt-in; even when true, audio never leaves the device

models:
  stt:
    engine: faster-whisper
    model: small                # multilingual (small.en is English-only, can't do Japanese)
    no_speech_threshold: 0.6    # discard transcript if Whisper's no_speech_prob exceeds this
  llm:
    engine: ollama
    model: llama3.2:3b
    temperature: 0.7
    max_response_tokens: 120    # trimmed to last complete sentence before TTS
    conversation_buffer_exchanges: 6  # rolling window of exchange pairs kept in context
  tts:
    engine: piper
    voice: en_US-kristin-medium   # public-domain, bright/younger; changeable in Settings
    length_scale: 1.1           # slightly slower speech for a learner
    fallback:
      - engine: xtts-v2
      - engine: elevenlabs-api  # requires ELEVENLABS_API_KEY and privacy.allow_cloud_fallback: true

audio:
  input_device: ""              # empty = OS default; substring-match to override (e.g. "AirPods")

safety:
  # NOTE: the keys below are declared for the future safety layer but are
  # NOT enforced yet (Phase 4 item). Setting them changes nothing today.
  blocklist_file: ./blocklist.txt          # NYI — no LLM→TTS word filter yet
  log_path: ~/.ai-avatar/logs/conversations.jsonl
  session_limit_minutes: 30                # NYI — no session-length enforcement
  # quiet_hours: "20:00-07:00"             # NYI — parental quiet-hours block

telemetry:
  enabled: true
  log_dir: ~/.ai-avatar/logs/
  retention_days: 90          # NYI — logs are not auto-pruned yet

memory:
  enabled: true
  profiles_dir: ~/.ai-avatar/profiles/
  max_topics: 20
  max_problems: 15
  topic_ttl_days: 14
  problem_ttl_days: 30
  short_response_words: 3      # ≤ this many words counts as a short response
  short_response_streak: 3     # consecutive short turns before re-engagement hint fires

app:
  window_title: "Nova"
  always_on_top: true
  recording_key: space
